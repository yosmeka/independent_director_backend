services:
  # The NestJS Backend
  - type: web
    name: director-portal-backend
    env: node
    plan: free # Change to a paid plan if needed
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: director-portal-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        sync: false # Set this to your Vercel URL after deployment
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: director-portal-db
    plan: free # Change to a paid plan if needed
    databaseName: zemen_director_portal
    user: zemen
